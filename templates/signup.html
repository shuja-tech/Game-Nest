<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Portal | Sign Up</title>
    <link rel="stylesheet" href="{{url_for('static',filename='style/signup.css')}}">
</head>
<body>
    <div class="box">
        <div class="border-line"></div>
        <form id="signup-form">
            <h2>Sign Up</h2>
            <div class="input-box">
                <input type="text" id="signup-username" required="required" autocomplete="username" placeholder="Username" aria-label="Username">
                <span>Username</span>
                <i></i>
            </div>
            <div class="input-box">
                <input type="password" id="signup-password" required="required" autocomplete="new-password" placeholder="Password" aria-label="Password">
                <span>Password</span>
                <i></i>
            </div>
            <div class="imp-links">
                <a href="/login">Already have an account?</a>
            </div>
            <input type="submit" value="Signup" class="btn">
        </form>

        <script src="{{url_for('static', filename='java/auth.js')}}"></script>
        <script>
            document.getElementById('signup-form').addEventListener('submit', window.__authHandlers.handleSignup);
        </script>
    </div>
</body>
</html>
