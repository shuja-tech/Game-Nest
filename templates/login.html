<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Portal | Login</title>
    <link rel="stylesheet" href="{{url_for('static',filename='style/login.css')}}">
</head>
<body>
    <div class="box">
        <div class="border-line"></div>
        <form id="login-form">
            <h2>Log in</h2>
            <div class="input-box">
                <input type="text" id="login-username" required="required" autocomplete="username" placeholder="Username" aria-label="Username">
                <span>Username</span>
                <i></i>
            </div>
            <div class="input-box">
                <input type="password" id="login-password" required="required" autocomplete="current-password" placeholder="Password" aria-label="Password">
                <span>Password</span>
                <i></i>
            </div>
            <div class="imp-links">
                <a href="#">Forgot Password?</a>
                <a href="/signup">Sign Up</a>
            </div>
            <input type="submit" value="Login" class="btn">
        </form>

        <script src="{{url_for('static', filename='java/auth.js')}}"></script>
        <script>
            document.getElementById('login-form').addEventListener('submit', window.__authHandlers.handleLogin);
        </script>
    </div>
</body>
</html>
